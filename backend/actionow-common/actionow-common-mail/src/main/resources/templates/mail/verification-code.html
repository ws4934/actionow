<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码 - 开拍 ActioNow</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            background-color: #0B0B0B;
            margin: 0;
            padding: 24px;
            color: #F5F5F5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1A1A1A;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333333;
        }
        /* -- Header: 影棚黑 + 高能黄 Logo -- */
        .header {
            background-color: #0B0B0B;
            padding: 32px 30px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            margin: 0;
        }
        .logo-actio { color: #F5F5F5; }
        .logo-n { color: #FFD700; font-style: italic; }
        .logo-ow { color: #F5F5F5; }
        .logo-sub {
            font-size: 12px;
            color: #999999;
            margin-top: 6px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        /* -- Content -- */
        .content {
            padding: 40px 30px;
        }
        .content p {
            color: #CCCCCC;
            font-size: 14px;
            line-height: 1.8;
            margin: 0 0 16px 0;
        }
        .scene-label {
            display: inline-block;
            background-color: #FFD700;
            color: #0B0B0B;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 2px;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        /* -- 验证码区域 -- */
        .code-box {
            background-color: #0B0B0B;
            border: 1px solid #333333;
            border-left: 3px solid #FFD700;
            border-radius: 4px;
            padding: 24px;
            text-align: center;
            margin: 24px 0;
        }
        .code {
            font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 12px;
            color: #FFD700;
        }
        .expire-note {
            color: #999999;
            font-size: 12px;
            margin-top: 12px;
        }
        /* -- 警告 -- */
        .warning {
            color: #E74C3C;
            font-size: 12px;
            margin-top: 24px;
            padding: 12px 16px;
            background-color: rgba(231, 76, 60, 0.08);
            border-radius: 4px;
            border-left: 3px solid #E74C3C;
        }
        /* -- Footer -- */
        .footer {
            background-color: #0B0B0B;
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #333333;
        }
        .footer p {
            color: #666666;
            font-size: 11px;
            margin: 4px 0;
            line-height: 1.6;
        }
        .footer .brand {
            color: #FFD700;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="logo-actio">Actio</span><span class="logo-n">N</span><span class="logo-ow">ow</span>
            </div>
            <div class="logo-sub">AI Film Creation Platform</div>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="scene-label">VERIFICATION</div>
            <p>您好，</p>
            <p>您正在进行身份验证操作，以下是您的验证指令码：</p>

            <div class="code-box">
                <div class="code" th:text="${code}">123456</div>
                <div class="expire-note">
                    有效期 <strong th:text="${expireMinutes}">10</strong> 分钟 | 过期后请重新获取
                </div>
            </div>

            <p class="warning">
                NG! 如果您没有进行此操作，请忽略此邮件。请勿将验证码透露给他人。
            </p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>此邮件由系统自动发送，请勿直接回复。</p>
            <p><span class="brand">开拍 ActioNow</span> &mdash; Speed of Thought, Quality of Film.</p>
        </div>
    </div>
</body>
</html>
