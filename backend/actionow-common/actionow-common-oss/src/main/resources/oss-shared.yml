# 所有启用了 actionow-common-oss 的模块通过 spring.config.import 引入本文件，
# 把提供商无关的 OSS 默认值集中到一处，避免跨模块的配置重复。
# 每个提供商各自一段，真实启用哪一段由 actionow.oss.type 与 OssStartupValidator 决定。

actionow:
  oss:
    # 存储类型：minio / s3 / aliyun / r2 / tos
    type: ${OSS_TYPE:minio}
    # 自定义公开访问域名（可选，适用于所有提供商）
    domain: ${OSS_DOMAIN:}

    # MinIO（本地/自托管默认；MINIO_BUCKET_NAME 在所有 docker-compose 中均为 actionow-assets）
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET_NAME:actionow-assets}

    # AWS S3（生产必须通过环境变量注入；空值在 prod profile 下由 OssStartupValidator 拒绝启动）
    s3:
      access-key-id: ${S3_ACCESS_KEY_ID:}
      secret-access-key: ${S3_SECRET_ACCESS_KEY:}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:}
      transfer-acceleration: ${S3_TRANSFER_ACCELERATION:false}
      cloudfront-domain: ${S3_CLOUDFRONT_DOMAIN:}
      cloudfront-key-pair-id: ${S3_CLOUDFRONT_KEY_PAIR_ID:}
      cloudfront-private-key-path: ${S3_CLOUDFRONT_PRIVATE_KEY_PATH:}
      presigned-url-expire-seconds: ${S3_PRESIGNED_EXPIRE:3600}

    # 阿里云 OSS
    aliyun:
      endpoint: ${ALIYUN_ENDPOINT:}
      access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
      bucket: ${ALIYUN_BUCKET:}
      internal-endpoint: ${ALIYUN_INTERNAL_ENDPOINT:}
      presigned-url-expire-seconds: ${ALIYUN_PRESIGNED_EXPIRE:3600}

    # Cloudflare R2
    r2:
      account-id: ${R2_ACCOUNT_ID:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      public-domain: ${R2_PUBLIC_DOMAIN:}
      presigned-url-expire-seconds: ${R2_PRESIGNED_EXPIRE:3600}

    # 火山引擎 TOS
    tos:
      endpoint: ${TOS_ENDPOINT:}
      access-key-id: ${TOS_ACCESS_KEY_ID:}
      secret-access-key: ${TOS_SECRET_ACCESS_KEY:}
      bucket: ${TOS_BUCKET:}
      region: ${TOS_REGION:cn-beijing}
      public-domain: ${TOS_PUBLIC_DOMAIN:}
      presigned-url-expire-seconds: ${TOS_PRESIGNED_EXPIRE:3600}
