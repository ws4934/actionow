server:
  port: 8088

spring:
  application:
    name: actionow-collab
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    discovery:
      client:
        simple:
          instances:
            actionow-user:
              - uri: ${USER_SERVICE_URL:http://actionow-user:8081}
            actionow-project:
              - uri: ${PROJECT_SERVICE_URL:http://actionow-project:8084}
            actionow-workspace:
              - uri: ${WORKSPACE_SERVICE_URL:http://actionow-workspace:8082}

  # PostgreSQL 数据源
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:actionow}?currentSchema=public&stringtype=unspecified
    username: ${DB_USER:actionow}
    password: ${DB_PASSWORD:actionow123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 30000
      pool-name: ActionowCollabHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 4
        max-concurrency: 8

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Feign 配置
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 10000
        logger-level: basic
  circuitbreaker:
    enabled: true

# Actionow 配置
actionow:
  # 内部服务认证（HMAC签名）
  internal:
    auth-secret: ${INTERNAL_AUTH_SECRET:actionow-dev-internal-secret-key-32chars}
    signature-max-age-seconds: 300
  # JWT 配置（本地验证，密钥必须与 actionow-user 一致）
  jwt:
    secret: ${JWT_SECRET:actionow-default-secret-key-please-change-in-production}
    issuer: actionow
    access-token-expire: 7200
    refresh-token-expire: 604800

# 日志配置
logging:
  level:
    com.actionow: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 协作服务配置
collab:
  # 在线状态 TTL（秒）
  presence:
    ttl: 90
  # 心跳间隔（秒）
  heartbeat:
    interval: 45
  # 实体协作配置
  entity:
    # 查看者 TTL（秒）
    viewer-ttl: 90
    # 编辑锁 TTL（秒）
    edit-lock-ttl: 180
  # WebSocket 配置
  websocket:
    # 空闲超时（毫秒）
    idle-timeout: 300000
    # 最大消息大小（字节）
    max-message-size: 131072
  # 广播配置
  broadcast:
    async: true
