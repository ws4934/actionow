server:
  port: 8089

spring:
  application:
    name: actionow-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    discovery:
      client:
        simple:
          instances:
            actionow-workspace:
              - uri: ${WORKSPACE_SERVICE_URL:http://actionow-workspace:8082}

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:actionow}?currentSchema=public&stringtype=unspecified
    username: ${DB_USER:actionow}
    password: ${DB_PASSWORD:actionow123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: ActionowSystemHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 内部服务认证（HMAC签名）
actionow:
  internal:
    auth-secret: ${INTERNAL_AUTH_SECRET:actionow-dev-internal-secret-key-32chars}
    signature-max-age-seconds: 300

# 日志配置
logging:
  level:
    com.actionow: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# 系统服务配置
system:
  config:
    # 单条配置在 Redis 的 TTL（秒）
    cache-ttl: 3600
    # 定时全量刷新 Redis 缓存的间隔（毫秒），默认 5 分钟
    refresh-interval-ms: 300000
    # 启动后首次刷新延迟（毫秒），让其他依赖（Redis、DB）先准备好
    refresh-initial-delay-ms: 60000
  dict:
    cache-ttl: 7200
  stats:
    daily-aggregation-cron: "0 5 0 * * ?"
    weekly-aggregation-cron: "0 10 0 * * MON"
    monthly-aggregation-cron: "0 15 0 1 * ?"
